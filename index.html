<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Formularios | Bocadeli</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0E1F7A">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <img src="logo.png" alt="Bocadeli" class="main-logo">
                <div class="brand-text">
                    <span class="bi-text">INTELIGENCIA COMERCIAL · BI</span>
                    <h1>PORTAL DE FORMULARIOS</h1>
                </div>
            </div>
            <div class="slogan-area">
                <img src="https://img.icons8.com/color/96/null/smiling-sun.png" style="width:40px; display:none;"> 
                <span class="slogan">¡DALE <br><strong>SABOR</strong><br> A TU VIDA!</span>
            </div>
        </div>
    </header>

    <section class="search-section">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Buscar formulario por nombre, área o palabra clave...">
        </div>
    </section>

    <nav class="filter-nav">
        <div id="filter-container" class="filter-container">
            <!-- Los botones de filtro se generan dinámicamente -->
        </div>
    </nav>

    <main class="container">
        <div id="results-area">
            <!-- Los formularios agrupados aparecerán aquí -->
        </div>
    </main>

    <div id="ios-prompt" class="ios-prompt hidden">
        <p>Instala esta App: Toca <span class="share-icon">⎋</span> y "Añadir a pantalla de inicio".</p>
    </div>

    <button id="installBtn" class="btn-install hidden">Instalar Aplicación</button>

    <script src="pwa.js"></script>
    <script src="app.js"></script>
</body>
</html>
