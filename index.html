<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Formularios | Bocadeli</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0E1F7A">
    <link rel="icon" href="logo.png">
</head>
<body>

    <header class="navbar">
        <div class="navbar-content">
            <img src="logo.png" alt="Bocadeli" class="nav-logo">
            <span class="nav-title">BOCADELI</span>
        </div>
    </header>

    <main class="main-content">
        <section class="hero">
            <h1>Bienvenido al Portal</h1>
            <p>Seleccione el formulario correspondiente para su gestión en campo.</p>
        </section>

        <!-- BUSCADOR CORREGIDO -->
        <section class="search-area">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por nombre o categoría...">
            </div>
        </section>

        <!-- FILTROS RESPONSIVE -->
        <nav class="filter-wrapper">
            <div id="filter-container" class="filter-container">
                <!-- Botones se cargan aquí -->
            </div>
        </nav>

        <div id="results-area" class="results-area">
            <!-- Cards se cargan aquí -->
        </div>
    </main>

    <button id="installBtn" class="btn-install hidden">Instalar Aplicación</button>

    <script src="pwa.js"></script>
    <script src="app.js"></script>
</body>
</html>
