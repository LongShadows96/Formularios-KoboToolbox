<style>
:root{
  --azul-marino:#0e1f7a;
  --azul-brillo:#1c4fd6;
  --rojo:#e30613;
  --rojo-oscuro:#b3040f;
  --amarillo:#f5e500;
  --blanco:#ffffff;
  --gris-fondo:#f4f6fb;
  --gris-texto:#1c1f33;
  --gris-medio:#6b7280;
  --sombra: 0 10px 30px rgba(14,31,122,.10);
  --radio: 18px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',Arial,sans-serif;
  background:var(--gris-fondo);
  color:var(--gris-texto);
  -webkit-font-smoothing:antialiased;
  padding-bottom:40px;
}

/* ===== HEADER ===== */
header{
  position:relative;
  background:linear-gradient(135deg,var(--azul-marino) 0%,#132a99 55%,var(--azul-brillo) 100%);
  color:var(--blanco);
  padding:28px 20px 56px;
  overflow:hidden;
}
.header-inner{
  max-width:1100px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
}
.marca-izq{
  display:flex;
  align-items:center;
  gap:16px;
  flex:1;
  min-width:220px;
}
.logo-wrap{
  width:70px;height:70px;flex:none;
  border-radius:50%;
  background:var(--blanco);
  padding:4px;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}
.logo-wrap img{width:100%;height:100%;object-fit:contain;border-radius:50%;display:block}
.eyebrow{
  text-transform:uppercase;
  letter-spacing:.14em;
  font-size:11px;
  font-weight:700;
  color:var(--amarillo);
  margin-bottom:4px;
}
h1{
  font-family:'Anton',Arial,sans-serif;
  font-weight:400;
  font-size:clamp(24px,4.6vw,38px);
  letter-spacing:.01em;
  line-height:1.05;
  text-transform:uppercase;
}
.eslogan-wrap{
  flex:none;
  margin-left:auto;
}
.eslogan-img{
  height:96px;
  display:block;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));
}
@media (max-width:640px){
  .header-inner{justify-content:center;text-align:center}
  .marca-izq{justify-content:center}
  .eslogan-wrap{margin:0 auto}
  .eslogan-img{height:64px;margin-top:4px}
}
.header-wave{
  position:absolute;
  left:0;bottom:-1px;width:100%;
  line-height:0;
}
.header-wave svg{width:100%;height:44px;display:block}

/* ===== CONTENEDOR ===== */
.container{max-width:1100px;margin:-30px auto 0;padding:0 20px}

.buscador-card{
  background:var(--blanco);
  border-radius:var(--radio);
  box-shadow:var(--sombra);
  padding:14px;
  display:flex;
  gap:10px;
  align-items:center;
  position:relative;
  z-index:3;
}
.buscador-card svg{flex:none;color:var(--gris-medio)}
#buscar{
  flex:1;border:none;outline:none;
  font-size:16px;font-family:'Inter',sans-serif;
  background:transparent;color:var(--gris-texto);
}
#buscar::placeholder{color:#9aa0b4}
#limpiar{
  display:none;
  border:none;background:var(--gris-fondo);
  width:28px;height:28px;border-radius:50%;
  color:var(--gris-medio);font-size:16px;cursor:pointer;
  align-items:center;justify-content:center;
}

/* ===== FILTROS ===== */
.filtros{
  display:flex;gap:8px;overflow-x:auto;
  margin:18px 0 8px;
  padding-bottom:4px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filtros::-webkit-scrollbar{display:none}
.pill{
  flex:none;
  border:2px solid transparent;
  background:var(--blanco);
  color:var(--azul-marino);
  font-weight:700;
  font-size:13.5px;
  padding:9px 16px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(14,31,122,.08);
  transition:.15s;
}
.pill .n{
  display:inline-block;margin-left:6px;
  background:var(--gris-fondo);
  color:var(--gris-medio);
  font-size:11px;font-weight:800;
  padding:1px 7px;border-radius:999px;
}
.pill.activa{
  background:var(--rojo);
  color:var(--blanco);
  border-color:var(--rojo);
}
.pill.activa .n{background:rgba(255,255,255,.25);color:var(--blanco)}

/* ===== SECCIONES / CATEGORIAS ===== */
.cat{margin:26px 0}
.cat h2{
  font-family:'Anton',Arial,sans-serif;
  font-weight:400;
  text-transform:uppercase;
  font-size:20px;
  color:var(--azul-marino);
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.cat h2::before{
  content:"";
  width:10px;height:22px;
  background:var(--amarillo);
  border-radius:3px;
  box-shadow:3px 0 0 var(--rojo);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}
.card{
  background:var(--blanco);
  border-radius:var(--radio);
  padding:20px;
  box-shadow:var(--sombra);
  display:flex;flex-direction:column;gap:10px;
  transition:.2s transform, .2s box-shadow;
  border:1px solid rgba(14,31,122,.05);
}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(14,31,122,.16)}
.card .icono{
  width:44px;height:44px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--azul-marino),var(--azul-brillo));
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.card h3{
  font-size:16.5px;
  color:var(--gris-texto);
  font-weight:800;
  line-height:1.3;
}
.card p{
  font-size:13.5px;
  color:var(--gris-medio);
  line-height:1.5;
  flex:1;
}
.btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  text-align:center;
  background:var(--rojo);
  color:var(--blanco);
  padding:12px;border-radius:12px;
  text-decoration:none;font-weight:700;font-size:14px;
  transition:.15s;
}
.btn:hover{background:var(--rojo-oscuro)}
.btn:active{transform:scale(.98)}

.vacio{
  text-align:center;
  padding:60px 20px;
  color:var(--gris-medio);
}
.vacio .emoji{font-size:40px;display:block;margin-bottom:10px}

/* ===== BOTON INSTALAR ===== */
#instalarBtn{
  position:fixed;
  right:18px;bottom:18px;
  display:none;
  align-items:center;gap:8px;
  background:var(--amarillo);
  color:var(--azul-marino);
  font-weight:800;font-size:14px;
  border:none;border-radius:999px;
  padding:13px 18px;
  box-shadow:0 10px 26px rgba(14,31,122,.35);
  cursor:pointer;
  z-index:50;
}
#instalarBtn:active{transform:scale(.97)}

/* ===== FOOTER ===== */
footer{
  text-align:center;color:var(--gris-medio);
  padding:34px 20px 10px;font-size:12.5px;
}
footer strong{color:var(--azul-marino)}

@media (max-width:520px){
  .header-inner{gap:14px}
  .logo-wrap{width:62px;height:62px}
  .eslogan-img{height:26px}
}
</style>
</head>

<div class="container">

  <div class="buscador-card">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="buscar" placeholder="Buscar formulario por nombre, área o palabra clave...">
    <button id="limpiar" aria-label="Limpiar búsqueda">✕</button>
  </div>

  <div id="filtros" class="filtros"></div>

  <div id="contenido"></div>

</div>

<button id="instalarBtn">📲 Instalar app</button>

<footer>
  Portal interno de formularios · <strong>BocaDeli</strong> · Inteligencia Comercial BI
</footer>

<script>
// =====================================================================
//  SOLO EDITA ESTA LISTA para agregar, quitar o modificar formularios
// =====================================================================
const formularios=[

{categoria:"Comercial",nombre:"Evaluación de Mercado – Jefes, Coordinadores, Supervisores",icono:"📋",descripcion:"Evaluaciones de mercado: nuestra marca y la competencia.",url:"https://ee.kobotoolbox.org/x/xjILeZWO"},

{categoria:"Comercial",nombre:"Estudio de Tiempos de Ventas",icono:"⏳",descripcion:"Medición de tiempos de las actividades del vendedor.",url:"https://ee.kobotoolbox.org/x/Ns5ZGvxy"},

{categoria:"Comercial",nombre:"Acompañamiento Comercial (Face to Face)",icono:"🚚",descripcion:"Seguimiento y compromisos de los vendedores.",url:"https://ee.kobotoolbox.org/x/BVOSoxFt"},

{categoria:"Tecnología",nombre:"Encuesta de Satisfacción – Sistemas de Ventas",icono:"📍",descripcion:"Encuesta del desempeño de los analistas, no de aplicaciones.",url:"https://ee.kobotoolbox.org/x/dJZCSfoc"},

{categoria:"Censos",nombre:"Capitalización de Censo",icono:"📦",descripcion:"Capitalización de las oportunidades de censo BocaDeli.",url:"https://ee.kobotoolbox.org/x/BXG2L4Yx"}

];
// =====================================================================

let filtroActivo="Todos";
let textoBusqueda="";

function iconoCategoria(cat){
  const mapa={"Comercial":"💼","Tecnología":"💻","Censos":"🗺️"};
  return mapa[cat] || "🗂️";
}

function listaFiltrada(){
  const t=textoBusqueda.toLowerCase().trim();
  return formularios.filter(f=>{
    const coincideCat = filtroActivo==="Todos" || f.categoria===filtroActivo;
    const coincideTexto = !t ||
      f.nombre.toLowerCase().includes(t) ||
      f.categoria.toLowerCase().includes(t) ||
      f.descripcion.toLowerCase().includes(t);
    return coincideCat && coincideTexto;
  });
}

function renderFiltros(){
  const cont=document.getElementById("filtros");
  const categorias=[...new Set(formularios.map(f=>f.categoria))];
  const todas=["Todos",...categorias];
  cont.innerHTML="";
  todas.forEach(cat=>{
    const count = cat==="Todos" ? formularios.length : formularios.filter(f=>f.categoria===cat).length;
    const btn=document.createElement("button");
    btn.className="pill"+(cat===filtroActivo?" activa":"");
    btn.innerHTML = `${cat==="Todos"?"🔎":iconoCategoria(cat)} ${cat} <span class="n">${count}</span>`;
    btn.addEventListener("click",()=>{
      filtroActivo=cat;
      renderFiltros();
      renderContenido();
    });
    cont.appendChild(btn);
  });
}

function renderContenido(){
  const cont=document.getElementById("contenido");
  const lista=listaFiltrada();
  cont.innerHTML="";

  if(lista.length===0){
    cont.innerHTML = `<div class="vacio"><span class="emoji">🔍</span>No se encontraron formularios.<br>Probá con otra palabra o categoría.</div>`;
    return;
  }

  const categorias=[...new Set(lista.map(x=>x.categoria))];

  categorias.forEach(cat=>{
    const sec=document.createElement("div");
    sec.className="cat";
    sec.innerHTML=`<h2>${iconoCategoria(cat)} ${cat}</h2><div class="grid"></div>`;
    const grid=sec.querySelector(".grid");

    lista.filter(x=>x.categoria===cat).forEach(f=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <div class="icono">${f.icono}</div>
        <h3>${f.nombre}</h3>
        <p>${f.descripcion}</p>
        <a class="btn" href="${f.url}" target="_blank" rel="noopener">Abrir formulario →</a>
      `;
      grid.appendChild(card);
    });

    cont.appendChild(sec);
  });
}

document.getElementById("buscar").addEventListener("input",e=>{
  textoBusqueda=e.target.value;
  document.getElementById("limpiar").style.display = textoBusqueda ? "flex" : "none";
  renderContenido();
});

document.getElementById("limpiar").addEventListener("click",()=>{
  textoBusqueda="";
  document.getElementById("buscar").value="";
  document.getElementById("limpiar").style.display="none";
  renderContenido();
});

renderFiltros();
renderContenido();

// =====================================================================
//  Instalación como app en el celular
//  (archivo único: usamos el prompt nativo si el navegador lo ofrece,
//   y si no, mostramos instrucciones claras paso a paso)
// =====================================================================
let deferredPrompt=null;
const instalarBtn=document.getElementById("instalarBtn");
instalarBtn.style.display="flex"; // siempre visible

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
});

instalarBtn.addEventListener("click", async ()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
    return;
  }
  const esIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const esAndroid=/android/i.test(navigator.userAgent);
  if(esIOS){
    alert("Para instalar en iPhone/iPad:\n\n1. Tocá el botón Compartir (⬆️) en la barra del navegador.\n2. Elegí 'Agregar a pantalla de inicio'.\n3. Confirmá tocando 'Agregar'.");
  } else if(esAndroid){
    alert("Para instalar en Android:\n\n1. Tocá el menú (⋮) arriba a la derecha del navegador.\n2. Elegí 'Agregar a pantalla de inicio' o 'Instalar app'.\n3. Confirmá tocando 'Agregar' o 'Instalar'.");
  } else {
    alert("Abrí el menú del navegador y buscá la opción 'Instalar app' o 'Agregar a pantalla de inicio'.");
  }
});

window.addEventListener("appinstalled", ()=>{
  instalarBtn.style.display="none";
});
</script>
